<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>RAOUF px — Enter Your Code</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta name="robots" content="noindex,nofollow"/>
  <link rel="icon" href="favicon.ico" type="image/x-icon"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    /* ── DESIGN TOKENS (matches main site) ── */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#080810;--surface:rgba(255,255,255,.04);
      --accent:#f0b44c;--accent2:#ff7e3e;--accent3:#4cf0d0;--accent4:#c84bff;
      --muted:rgba(255,255,255,.45);--text:rgba(255,255,255,.82);
    }
    html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Space Mono',monospace;overflow-x:hidden;cursor:none;display:flex;flex-direction:column}

    /* CRT scanlines */
    body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.11) 2px,rgba(0,0,0,.11) 4px);pointer-events:none;z-index:8000;opacity:.5}
    /* pixel grid */
    body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(240,180,76,.022) 1px,transparent 1px),linear-gradient(90deg,rgba(240,180,76,.022) 1px,transparent 1px);background-size:32px 32px;pointer-events:none;z-index:0}

    /* Cursor */
    .cursor{position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%)}
    .cursor-inner{width:12px;height:12px;background:var(--accent);clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);animation:cpulse 1.5s ease-in-out infinite}
    .cursor-outer{position:fixed;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);width:28px;height:28px;border:2px solid rgba(240,180,76,.35);clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);transition:width .2s,height .2s,border-color .2s}
    body:has(button:hover) .cursor-outer{width:42px;height:42px;border-color:var(--accent)}
    @keyframes cpulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.82)}}

    /* Glows */
    .glow{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(100px);opacity:.06}
    .glow-1{width:420px;height:420px;background:#f0b44c;top:-120px;left:-80px;animation:g1 22s ease-in-out infinite alternate}
    .glow-2{width:340px;height:340px;background:#4cf0d0;bottom:-60px;right:-60px;animation:g2 28s ease-in-out infinite alternate}
    @keyframes g1{to{transform:translate(50px,35px)}}
    @keyframes g2{to{transform:translate(-45px,-55px)}}

    /* ── LAYOUT ── */
    main{flex:1;position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem clamp(1rem,5vw,3rem);text-align:center;min-height:100dvh}

    /* ── LOGO ── */
    .logo-wrap{margin-bottom:3rem}
    .logo-frame{display:inline-flex;align-items:center;text-decoration:none;padding:6px;border:2px solid rgba(240,180,76,.22);position:relative}
    .logo-frame::before,.logo-frame::after{content:'';position:absolute;width:6px;height:6px;background:var(--accent)}
    .logo-frame::before{top:-3px;left:-3px}.logo-frame::after{bottom:-3px;right:-3px}
    .logo-frame img{height:2rem;width:auto;filter:drop-shadow(0 0 10px rgba(240,180,76,.5)) drop-shadow(0 0 20px rgba(240,180,76,.2))}

    /* ── GATE CARD ── */
    .gate-card{width:100%;max-width:480px;background:var(--surface);border:2px solid rgba(240,180,76,.15);padding:clamp(1.5rem,5vw,2.8rem);position:relative}
    .gate-card::before{content:'';position:absolute;top:-2px;left:-2px;width:18px;height:18px;border-top:2px solid var(--accent);border-left:2px solid var(--accent)}
    .gate-card::after{content:'';position:absolute;bottom:-2px;right:-2px;width:18px;height:18px;border-bottom:2px solid var(--accent3);border-right:2px solid var(--accent3)}

    /* eyebrow */
    .gate-tag{font-family:'Press Start 2P',monospace;font-size:.35rem;color:var(--accent3);letter-spacing:.22em;margin-bottom:1.4rem;display:block}
    .gate-tag::before{content:'> ';color:var(--accent)}
    .gate-project-label{display:block;font-family:'Space Mono',monospace;font-size:.65rem;color:var(--text);opacity:.32;letter-spacing:.18em;text-transform:uppercase;margin-bottom:.9rem}

    /* headline */
    .gate-title{font-family:'Press Start 2P',monospace;font-size:clamp(.7rem,2.5vw,1rem);color:#fff;line-height:1.8;margin-bottom:.8rem;text-shadow:2px 2px 0 rgba(240,180,76,.15)}

    /* sub */
    .gate-sub{font-family:'Space Mono',monospace;font-size:.78rem;color:var(--muted);line-height:1.9;margin-bottom:2rem}

    /* divider */
    .gate-divider{width:60px;height:3px;background:linear-gradient(90deg,var(--accent3),var(--accent),transparent);margin:0 auto 2rem}

    /* ── INPUT ── */
    .input-wrap{position:relative;margin-bottom:1rem}
    .code-input{
      width:100%;
      font-family:'Press Start 2P',monospace;font-size:clamp(.55rem,2.2vw,.75rem);
      letter-spacing:.18em;text-align:center;text-transform:uppercase;
      color:#fff;background:rgba(255,255,255,.04);
      border:2px solid rgba(240,180,76,.25);
      padding:1.1rem 1rem;
      outline:none;cursor:none;
      caret-color:var(--accent);
      transition:border-color .2s,box-shadow .2s;
      /* no rounding — pixel style */
    }
    .code-input::placeholder{color:rgba(255,255,255,.18);letter-spacing:.1em}
    .code-input:focus{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 0 18px rgba(240,180,76,.12)}
    .code-input.error{border-color:var(--accent2);box-shadow:0 0 0 1px var(--accent2),0 0 18px rgba(255,126,62,.15);animation:shake .35s steps(6)}
    .code-input.success{border-color:var(--accent3);box-shadow:0 0 0 1px var(--accent3),0 0 18px rgba(76,240,208,.2)}
    @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}

    /* char counter */
    .char-hint{font-family:'Press Start 2P',monospace;font-size:.28rem;color:rgba(255,255,255,.15);text-align:right;margin-top:.4rem;letter-spacing:.08em;min-height:1rem}

    /* ── SUBMIT BUTTON ── */
    .btn-submit{
      width:100%;
      font-family:'Press Start 2P',monospace;font-size:.6rem;
      color:#080810;background:var(--accent);
      border:none;cursor:none;
      padding:1.1rem 1rem;
      letter-spacing:.08em;line-height:1.4;
      position:relative;
      box-shadow:4px 4px 0 #7a5a20,7px 7px 0 rgba(0,0,0,.35);
      transition:box-shadow .1s steps(1),transform .1s steps(1);
      margin-bottom:1rem;
    }
    .btn-submit::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.18) 0%,transparent 55%);pointer-events:none}
    .btn-submit:hover:not(:disabled){box-shadow:2px 2px 0 #7a5a20,4px 4px 0 rgba(0,0,0,.35);transform:translate(2px,2px)}
    .btn-submit:active:not(:disabled){box-shadow:0 0 0 #7a5a20;transform:translate(4px,4px)}
    .btn-submit:disabled{opacity:.5;cursor:not-allowed}

    /* ── STATUS MESSAGES ── */
    .status-msg{font-family:'Press Start 2P',monospace;font-size:.35rem;letter-spacing:.1em;min-height:1.2rem;line-height:2;padding:.5rem 0;transition:opacity .2s}
    .status-msg.hidden{opacity:0}
    .status-msg.error{color:var(--accent2)}
    .status-msg.error::before{content:'✕ '}
    .status-msg.loading{color:var(--muted)}
    .status-msg.loading::before{content:'... '}

    /* loading bar */
    .loading-bar{height:2px;width:0%;background:linear-gradient(90deg,var(--accent3),var(--accent));transition:width .4s ease;margin-bottom:1.2rem}
    .loading-bar.active{animation:loadpulse 1.2s ease-in-out infinite}
    @keyframes loadpulse{0%,100%{opacity:.5}50%{opacity:1}}

    /* ── RATE LIMIT hint ── */
    .rate-hint{font-family:'Press Start 2P',monospace;font-size:.26rem;color:rgba(255,255,255,.12);letter-spacing:.06em;margin-top:.8rem}

    /* ── ANIMATIONS ── */
    @keyframes pxIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .gate-card{animation:pxIn .5s steps(10) .2s both}
    .logo-wrap{animation:pxIn .4s steps(8) 0s both}

    /* ── RESPONSIVE ── */
    @media(max-width:600px){
      .cursor,.cursor-outer{display:none}html,body{cursor:auto}
      .code-input{font-size:.6rem;letter-spacing:.12em}
    }
    @media(prefers-reduced-motion:reduce){
      *,*::before,*::after{animation:none!important;transition:none!important}
      .cursor,.cursor-outer{display:none}html,body{cursor:auto}.glow{display:none}
    }
    /* ── VIEW SWITCHING ── */
    #gatePage,#clientPage{width:100%}
    #gatePage{display:flex;flex-direction:column}
    #clientPage{display:none}
    #gatePage.fading{opacity:0;transition:opacity .35s ease;pointer-events:none}
    #clientPage.visible{
      display:flex;flex-direction:column;
      opacity:0;
      animation:cpPageIn .45s ease .05s forwards;
    }
    @keyframes cpPageIn{to{opacity:1}}

    /* ── CLIENT PAGE — cinematic, minimal, premium ── */
    #clientPage{
      position:relative;z-index:1;
      flex-direction:column;
      align-items:flex-start;justify-content:center;
      min-height:100dvh;
      padding:5rem clamp(1.8rem,8vw,6rem);
      max-width:640px;
      margin:0 auto;
      width:100%;
    }

    /* Welcome */
    .cp-welcome{
      font-family:'Space Mono',monospace;
      font-size:clamp(.75rem,2vw,.88rem);
      color:#F2E8D5;
      opacity:.55;
      letter-spacing:.06em;
      margin-bottom:3.5rem;
      font-weight:400;
    }

    /* Section label */
    .cp-section-label{
      font-family:'Press Start 2P',monospace;
      font-size:.32rem;
      letter-spacing:.22em;
      color:#F2E8D5;
      opacity:.28;
      text-transform:uppercase;
      margin-bottom:2.2rem;
    }

    /* Timeline */
    .cp-timeline{
      display:flex;
      flex-direction:column;
      gap:0;
      margin-bottom:3.2rem;
      width:100%;
    }
    .cp-step{
      display:flex;
      align-items:flex-start;
      gap:1rem;
      position:relative;
      padding-bottom:1.6rem;
    }
    /* connector line between steps */
    .cp-step:not(:last-child)::after{
      content:'';
      position:absolute;
      left:7px;
      top:18px;
      width:1px;
      height:calc(100% - 14px);
      background:rgba(242,232,213,.1);
    }
    .cp-step-dot{
      width:15px;height:15px;
      flex-shrink:0;
      display:flex;align-items:center;justify-content:center;
      margin-top:2px;
      position:relative;z-index:1;
    }
    /* filled dot — past/current */
    .cp-step-dot.done::before{
      content:'';
      display:block;
      width:9px;height:9px;
      border-radius:50%;
      background:#F2E8D5;
      opacity:.75;
    }
    /* current step — slightly larger, brighter */
    .cp-step.current .cp-step-dot.done::before{
      width:11px;height:11px;
      opacity:1;
      box-shadow:0 0 10px rgba(242,232,213,.4);
    }
    /* hollow dot — future */
    .cp-step-dot.pending::before{
      content:'';
      display:block;
      width:9px;height:9px;
      border-radius:50%;
      border:1px solid rgba(242,232,213,.2);
      background:transparent;
    }
    .cp-step-text{
      display:flex;
      flex-direction:column;
      gap:.25rem;
    }
    .cp-step-name{
      font-family:'Space Mono',monospace;
      font-size:.78rem;
      color:#F2E8D5;
      opacity:.35;
      line-height:1.4;
      transition:opacity .3s;
    }
    .cp-step.done .cp-step-name{ opacity:.55; }
    .cp-step.current .cp-step-name{
      opacity:.92;
      font-weight:700;
    }
    .cp-step-date{
      font-family:'Space Mono',monospace;
      font-size:.68rem;
      color:#F2E8D5;
      opacity:.38;
    }

    /* Dynamic status message */
    .cp-message{
      font-family:'Space Mono',monospace;
      font-size:clamp(.78rem,1.8vw,.88rem);
      color:#F2E8D5;
      opacity:.65;
      line-height:1.9;
      margin-bottom:2.8rem;
      font-style:italic;
    }

    /* Download button */
    .cp-download{
      display:inline-block;
      font-family:'Press Start 2P',monospace;
      font-size:.55rem;
      color:#080810;
      background:#F2E8D5;
      text-decoration:none;
      padding:1rem 2rem;
      letter-spacing:.07em;
      line-height:1.4;
      position:relative;
      box-shadow:3px 3px 0 #a09080,6px 6px 0 rgba(0,0,0,.3);
      transition:box-shadow .1s steps(1),transform .1s steps(1);
      cursor:pointer;
      border:none;
    }
    .cp-download::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.15) 0%,transparent 55%);pointer-events:none}
    .cp-download:hover{box-shadow:1px 1px 0 #a09080,3px 3px 0 rgba(0,0,0,.3);transform:translate(2px,2px)}
    .cp-download:active{box-shadow:0 0 0;transform:translate(4px,4px)}

    /* Exhausted message */
    .cp-exhausted{
      font-family:'Space Mono',monospace;
      font-size:.72rem;
      color:#F2E8D5;
      opacity:.3;
      letter-spacing:.05em;
    }

    /* Back link */
    .cp-back{
      display:inline-block;
      margin-top:3.5rem;
      font-family:'Press Start 2P',monospace;
      font-size:.28rem;
      color:#F2E8D5;
      opacity:.18;
      text-decoration:none;
      letter-spacing:.12em;
      text-transform:uppercase;
      transition:opacity .2s;
    }
    .cp-back:hover{opacity:.45}

    @media(max-width:600px){
      #clientPage{padding:3rem 1.4rem;text-align:left}
      .cp-download{font-size:.48rem;padding:.9rem 1.6rem}
    }
    @keyframes cpFadeIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    #clientPage.entering .cp-welcome{animation:cpFadeIn .5s ease .05s both}
    #clientPage.entering .cp-section-label{animation:cpFadeIn .5s ease .15s both}
    #clientPage.entering .cp-timeline{animation:cpFadeIn .5s ease .25s both}
    #clientPage.entering .cp-message{animation:cpFadeIn .5s ease .35s both}
    #clientPage.entering .cp-download,
    #clientPage.entering .cp-exhausted{animation:cpFadeIn .5s ease .45s both}
    :focus-visible{outline:2px solid var(--accent);outline-offset:3px}
  </style>
</head>
<body>

  <!-- Cursor -->
  <div class="cursor" id="cursorInner"><div class="cursor-inner"></div></div>
  <div class="cursor-outer" id="cursorOuter"></div>

  <!-- Glows -->
  <div class="glow glow-1" aria-hidden="true"></div>
  <div class="glow glow-2" aria-hidden="true"></div>

  <!-- ══ GATE PAGE (existing promo funnel entry) ══ -->
  <div id="gatePage">
  <main>
    <!-- Logo -->
    <div class="logo-wrap">
      <a href="index.html" class="logo-frame" aria-label="RAOUF px">
        <img src="images/logo.png" alt="RAOUF px" width="32" height="32" loading="eager"/>
      </a>
    </div>

    <!-- Gate card -->
    <div class="gate-card" role="main">
      <span class="gate-tag" aria-hidden="true">PRIVATE_ACCESS &nbsp;·&nbsp; INVITATION_ONLY</span>

      <span class="gate-project-label">The Private Portrait Project</span>

      <h1 class="gate-title">You Got a Code.<br>Let's See It.</h1>

      <div class="gate-divider" aria-hidden="true"></div>

      <p class="gate-sub">
        This access was not given to everyone.<br>Enter your code to continue.
      </p>

      <!-- Loading bar (shown during fetch) -->
      <div class="loading-bar" id="loadingBar" aria-hidden="true"></div>

      <!-- Code input -->
      <div class="input-wrap">
        <label for="codeInput" class="sr-only">Promo code</label>
        <input
          type="text"
          id="codeInput"
          class="code-input"
          placeholder="ENTER CODE"
          maxlength="12"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="characters"
          spellcheck="false"
          aria-describedby="statusMsg"
        />
        <div class="char-hint" id="charHint" aria-live="polite"></div>
      </div>

      <!-- Status message -->
      <p class="status-msg hidden" id="statusMsg" role="alert" aria-live="assertive"></p>

      <!-- Submit -->
      <button class="btn-submit" id="submitBtn" type="button" aria-label="Verify code">
        [ VERIFY CODE ]
      </button>

      <p class="rate-hint">Each code can only be used once.</p>
    </div>
  </main>
  </div><!-- /#gatePage -->

  <!-- ══ CLIENT PAGE (returning clients with active sessions) ══ -->
  <div id="clientPage" aria-hidden="true">
    <p class="cp-welcome" id="cpWelcome">Welcome back.</p>
    <p class="cp-section-label">Your session</p>
    <div class="cp-timeline" id="cpTimeline" role="list"></div>
    <p class="cp-message" id="cpMessage"></p>
    <div id="cpAction"></div>
    <a href="index.html" class="cp-back">← raoufpx.com</a>
  </div><!-- /#clientPage -->

  <!-- Screen reader only utility -->
  <style>.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap}</style>

  <script>
    (() => {
      'use strict';

      const API_BASE = 'https://raoufpx-promo-server-production.up.railway.app';

      /* ── Track QR scan on every page load ── */
      fetch(API_BASE + '/track-scan', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({}),
      }).catch(() => {});

      /* ── Auto-fill code from URL ?code= param ── */
      const urlCode = new URLSearchParams(window.location.search).get('code');
      if (urlCode) {
        input.value = urlCode.toUpperCase().trim();
        charHint.textContent = input.value.length + ' / 8 CHARS';
      }

      /* ── Cursor ── */
      const ci = document.getElementById('cursorInner');
      const co = document.getElementById('cursorOuter');
      if (window.matchMedia('(pointer:fine)').matches) {
        document.addEventListener('mousemove', e => {
          ci.style.left = e.clientX + 'px'; ci.style.top = e.clientY + 'px';
          co.style.left = e.clientX + 'px'; co.style.top = e.clientY + 'px';
        });
      } else {
        ci.style.display = co.style.display = 'none';
        document.body.style.cursor = 'auto';
      }

      /* ── Gate elements ── */
      const input      = document.getElementById('codeInput');
      const submitBtn  = document.getElementById('submitBtn');
      const statusMsg  = document.getElementById('statusMsg');
      const charHint   = document.getElementById('charHint');
      const loadingBar = document.getElementById('loadingBar');
      const gatePage   = document.getElementById('gatePage');
      const clientPage = document.getElementById('clientPage');

      /* ── Rate limiting ── */
      let attempts = 0;
      const MAX_ATTEMPTS = 5;
      let locked = false;

      /* ── Char counter ── */
      input.addEventListener('input', () => {
        const len = input.value.length;
        charHint.textContent = len > 0 ? `${len} / 8 CHARS` : '';
        input.classList.remove('error', 'success');
        setStatus('', '');
      });

      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') handleSubmit();
      });
      submitBtn.addEventListener('click', handleSubmit);

      /* ── Helpers ── */
      function setStatus(type, msg) {
        statusMsg.className = 'status-msg' + (type ? ` ${type}` : ' hidden');
        statusMsg.textContent = msg;
      }

      function setLoading(on) {
        loadingBar.className = 'loading-bar' + (on ? ' active' : '');
        loadingBar.style.width = on ? '100%' : '0%';
        submitBtn.disabled = on;
        input.disabled = on;
      }

      /* ══════════════════════════════════════════════════════════
         VIEW SWITCHING
      ══════════════════════════════════════════════════════════ */
      function showPromo() {
        clientPage.classList.remove('visible', 'entering');
        clientPage.setAttribute('aria-hidden', 'true');
        gatePage.classList.remove('fading');
        gatePage.style.opacity = '';
        gatePage.style.pointerEvents = '';
      }

      function showClient(sessionData, code) {
        // Redirect to the dedicated cinematic client page
        setLoading(true);
        window.location.assign('client.html?code=' + encodeURIComponent(code));
      }

      /* ══════════════════════════════════════════════════════════
         CLIENT PAGE RENDERING
      ══════════════════════════════════════════════════════════ */

      const STEPS = [
        { key: 'requested',  label: 'Requested' },
        { key: 'confirmed',  label: 'Confirmed' },
        { key: 'scheduled',  label: 'Scheduled' },
        { key: 'completed',  label: 'Session Completed' },
        { key: 'editing',    label: 'Editing in Progress' },
        { key: 'ready',      label: 'Ready' },
      ];

      const STATUS_MESSAGES = {
        requested:  'Your session request has been received.',
        confirmed:  'Your session has been confirmed.',
        scheduled:  'Your session is scheduled.',
        completed:  'Your session is complete. Editing is next.',
        editing:    'Your images are being carefully crafted.',
        ready:      'Your session is ready.',
      };

      function formatDate(dateStr) {
        if (!dateStr) return '';
        try {
          const d = new Date(dateStr);
          if (isNaN(d)) return dateStr;
          return d.toLocaleDateString('en-GB', { month: 'long', day: 'numeric' })
            + ', '
            + d.toLocaleTimeString('en-GB', { hour: 'numeric', minute: '2-digit', hour12: true })
              .toUpperCase().replace(' ', '');
        } catch { return dateStr; }
      }

      function renderTimeline(currentStatus, sessionDate) {
        const container = document.getElementById('cpTimeline');
        container.innerHTML = '';
        const currentIdx = STEPS.findIndex(s => s.key === currentStatus);

        STEPS.forEach((step, i) => {
          const isPast    = i < currentIdx;
          const isCurrent = i === currentIdx;
          const isDone    = isPast || isCurrent;

          const row = document.createElement('div');
          row.className = 'cp-step' + (isDone ? ' done' : '') + (isCurrent ? ' current' : '');
          row.setAttribute('role', 'listitem');

          const dot = document.createElement('div');
          dot.className = 'cp-step-dot ' + (isDone ? 'done' : 'pending');

          const textWrap = document.createElement('div');
          textWrap.className = 'cp-step-text';

          const name = document.createElement('span');
          name.className = 'cp-step-name';
          name.textContent = step.label;
          textWrap.appendChild(name);

          // Show session date on the scheduled step
          if (step.key === 'scheduled' && sessionDate && (isPast || isCurrent)) {
            const dateEl = document.createElement('span');
            dateEl.className = 'cp-step-date';
            dateEl.textContent = formatDate(sessionDate);
            textWrap.appendChild(dateEl);
          }

          row.appendChild(dot);
          row.appendChild(textWrap);
          container.appendChild(row);
        });
      }

      function renderClientPage(data, code) {
        // Welcome — API returns clientName, not name
        const welcomeEl = document.getElementById('cpWelcome');
        const name = data.clientName || data.name || null;
        welcomeEl.textContent = name
          ? `Welcome back, ${name}.`
          : 'Welcome back.';

        // Timeline
        renderTimeline(data.sessionStatus, data.sessionDate);

        // Dynamic message
        const msgEl = document.getElementById('cpMessage');
        msgEl.textContent = STATUS_MESSAGES[data.sessionStatus] || '';

        // Action area
        const actionEl = document.getElementById('cpAction');
        actionEl.innerHTML = '';

        if (data.sessionStatus === 'ready' && data.hasFile) {
          const maxDl  = data.maxDownloads || 2;
          const curDl  = data.downloadCount || 0;
          const spent  = maxDl > 0 && curDl >= maxDl;

          if (spent) {
            const msg = document.createElement('p');
            msg.className = 'cp-exhausted';
            msg.textContent = 'This session is no longer available.';
            actionEl.appendChild(msg);
          } else {
            const btn = document.createElement('a');
            btn.className = 'cp-download';
            btn.href = `${API_BASE}/client/download?code=${encodeURIComponent(code)}`;
            btn.textContent = 'Download Your Session';
            // Show remaining downloads if only 1 left
            if (maxDl > 0 && curDl === maxDl - 1) {
              const hint = document.createElement('p');
              hint.style.cssText = 'margin-top:.8rem;font-family:Space Mono,monospace;font-size:.62rem;color:#F2E8D5;opacity:.3;';
              hint.textContent = '1 download remaining.';
              actionEl.appendChild(btn);
              actionEl.appendChild(hint);
            } else {
              actionEl.appendChild(btn);
            }
          }
        }
      }

      /* ══════════════════════════════════════════════════════════
         API CALLS
      ══════════════════════════════════════════════════════════ */

      async function fetchClientStatus(code) {
        try {
          const res = await fetch(`${API_BASE}/client/status?code=${encodeURIComponent(code)}`);
          if (!res.ok) return null;
          const data = await res.json();
          return data;
        } catch (e) {
          return null; // network error → fall through to promo
        }
      }

      /* ── Client statuses that mean "show client page, not promo" ── */
      const CLIENT_STATUSES = new Set(['confirmed','scheduled','completed','editing','ready']);

      /* ══════════════════════════════════════════════════════════
         MAIN SUBMIT HANDLER
      ══════════════════════════════════════════════════════════ */
      async function handleSubmit() {
        if (locked) return;

        const code = input.value.trim().toUpperCase();

        if (!code) {
          setStatus('error', 'Please enter your code.');
          input.classList.add('error');
          input.focus();
          return;
        }

        if (code.length < 6) {
          setStatus('error', 'Code too short. Check your card.');
          input.classList.add('error');
          return;
        }

        attempts++;
        if (attempts > MAX_ATTEMPTS) {
          locked = true;
          setLoading(false);
          setStatus('error', 'Too many attempts. Please try again later.');
          submitBtn.disabled = true;
          input.disabled = true;
          return;
        }

        setLoading(true);
        setStatus('loading', 'Verifying...');
        input.classList.remove('error', 'success');

        try {
          // ── Step 1: check client status first ──
          const sessionData = await fetchClientStatus(code);

          if (sessionData && CLIENT_STATUSES.has(sessionData.sessionStatus)) {
            // ── Returning client → show client page, skip promo ──
            setLoading(false);
            input.classList.add('success');
            sessionStorage.setItem('raoufpx_code', code);
            showClient(sessionData, code);
            return;
          }

          // ── Step 2: standard promo code check ──
          const res = await fetch(`${API_BASE}/check-code`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ code }),
          });

          const data = await res.json();
          setLoading(false);

          if (data.valid) {
            input.classList.add('success');
            setStatus('', '');
            submitBtn.textContent = '[ UNLOCKING... ]';
            const expiresAt = data.expiresAt || (Date.now() + 48 * 60 * 60 * 1000);
            sessionStorage.setItem('raoufpx_promo',   btoa('GRANTED_' + Date.now()));
            sessionStorage.setItem('raoufpx_granted', '1');
            sessionStorage.setItem('raoufpx_expires', String(expiresAt));
            sessionStorage.setItem('raoufpx_code', code);
            setTimeout(() => {
              try { window.location.assign('promo.html'); }
              catch { window.location.href = 'promo.html'; }
            }, 700);

          } else {
            input.classList.add('error');
            const remaining = MAX_ATTEMPTS - attempts;
            const msg = data.message || 'Invalid code.';
            setStatus('error', remaining > 0
              ? `${msg} (${remaining} attempt${remaining !== 1 ? 's' : ''} left)`
              : msg
            );
            input.select();
          }

        } catch (err) {
          setLoading(false);
          setStatus('error', 'Connection error. Try again.');
          console.error(err);
        }
      }
    })();
  </script>
