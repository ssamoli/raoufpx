<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LEAD RADAR // RAOUF px</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap');

  :root {
    --bg: #020a04;
    --grid: rgba(0,255,70,0.06);
    --green: #00ff46;
    --green-dim: rgba(0,255,70,0.35);
    --green-glow: rgba(0,255,70,0.15);
    --amber: #f0b44c;
    --blue: #4cf0d0;
    --red: #ff4c4c;
    --purple: #c84bff;
    --text: rgba(0,255,70,0.82);
    --muted: rgba(0,255,70,0.4);
    --panel-bg: rgba(0,10,2,0.92);
    --border: rgba(0,255,70,0.22);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    height: 100%;
    overflow-x: hidden;
  }

  /* CRT effect overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.7) 100%);
    pointer-events: none;
    z-index: 9998;
  }

  /* ── LAYOUT ── */
  .shell {
    display: grid;
    grid-template-rows: 48px 1fr;
    grid-template-columns: 1fr 340px;
    height: 100vh;
    gap: 0;
  }

  /* ── TOP BAR ── */
  .topbar {
    grid-column: 1 / -1;
    display: flex; align-items: center; gap: 24px;
    padding: 0 24px;
    border-bottom: 1px solid var(--border);
    background: rgba(0,8,2,0.95);
  }
  .topbar-logo {
    font-family: 'VT323', monospace;
    font-size: 22px;
    letter-spacing: 3px;
    color: var(--green);
    text-shadow: 0 0 10px var(--green);
  }
  .topbar-sep { flex: 1; }
  .topbar-stat {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
  }
  .topbar-stat span { color: var(--green); }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: pulse 1.4s infinite;
    display: inline-block;
    margin-right: 6px;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ── RADAR PANEL ── */
  .radar-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
    border-right: 1px solid var(--border);
  }

  .radar-wrap {
    position: relative;
    width: 480px; height: 480px;
    max-width: 90vw;
    max-height: 90vw;
  }

  canvas#radarCanvas {
    width: 100%; height: 100%;
    image-rendering: pixelated;
  }

  /* Signal notification */
  .signal-notify {
    position: absolute;
    bottom: -52px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,255,70,0.08);
    border: 1px solid var(--green-dim);
    padding: 6px 18px;
    font-size: 11px;
    color: var(--green);
    letter-spacing: 2px;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.3s;
    text-align: center;
  }
  .signal-notify.show { opacity: 1; }
  .signal-notify .src { color: var(--amber); }

  /* Radar bottom labels */
  .radar-labels {
    display: flex; gap: 20px; margin-top: 60px;
    font-size: 10px; letter-spacing: 1.5px;
  }
  .rl { display: flex; align-items: center; gap: 6px; }
  .rl-dot { width: 8px; height: 8px; border-radius: 50%; }

  /* ── SIDEBAR ── */
  .sidebar {
    display: flex; flex-direction: column;
    background: var(--panel-bg);
    overflow: hidden;
  }

  .sidebar-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
    font-family: 'VT323', monospace;
    font-size: 18px;
    letter-spacing: 3px;
    color: var(--green);
    display: flex; align-items: center; gap: 8px;
  }

  /* Filters */
  .filters {
    padding: 10px 16px;
    display: flex; gap: 6px; flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
  }
  .filter-btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 3px 9px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover,
  .filter-btn.active {
    border-color: var(--green);
    color: var(--green);
    background: var(--green-glow);
  }

  /* Leads list */
  .leads-list {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .lead-card {
    padding: 10px 16px;
    border-bottom: 1px solid rgba(0,255,70,0.07);
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }
  .lead-card:hover { background: rgba(0,255,70,0.05); }
  .lead-card.selected { background: rgba(0,255,70,0.09); border-left: 2px solid var(--green); }

  .lc-top { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; }
  .lc-platform {
    font-size: 9px; letter-spacing: 1px;
    padding: 1px 5px;
    border: 1px solid currentColor;
    border-radius: 2px;
  }
  .lc-platform.reddit { color: var(--amber); }
  .lc-platform.upwork { color: var(--blue); }
  .lc-platform.instagram { color: var(--purple); }

  .lc-user { font-size: 11px; color: var(--green); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .lc-time { font-size: 9px; color: var(--muted); }

  .lc-title { font-size: 10px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .status-badge {
    position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
    font-size: 8px; letter-spacing: 1px; padding: 2px 5px;
    border-radius: 2px;
  }
  .status-badge.new { background: rgba(0,255,70,0.15); color: var(--green); }
  .status-badge.contacted { background: rgba(240,180,76,0.15); color: var(--amber); }
  .status-badge.replied { background: rgba(76,240,208,0.15); color: var(--blue); }
  .status-badge.code_sent { background: rgba(200,75,255,0.15); color: var(--purple); }
  .status-badge.booked { background: rgba(0,255,70,0.25); color: var(--green); }

  /* New lead pulse */
  .lead-card.new-arrival { animation: newArrive 0.5s ease; }
  @keyframes newArrive {
    0% { background: rgba(0,255,70,0.25); }
    100% { background: transparent; }
  }

  /* ── DETAIL PANEL ── */
  .detail-panel {
    position: fixed;
    right: 0; top: 48px;
    width: 340px; height: calc(100vh - 48px);
    background: rgba(2,12,4,0.97);
    border-left: 1px solid var(--green-dim);
    transform: translateX(100%);
    transition: transform 0.25s ease;
    z-index: 100;
    display: flex; flex-direction: column;
    overflow-y: auto;
    padding: 20px;
  }
  .detail-panel.open { transform: translateX(0); }

  .dp-close {
    position: absolute; top: 14px; right: 16px;
    background: none; border: none; color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px; cursor: pointer; letter-spacing: 1px;
  }
  .dp-close:hover { color: var(--green); }

  .dp-platform { font-size: 10px; letter-spacing: 2px; margin-bottom: 6px; }
  .dp-user {
    font-family: 'VT323', monospace;
    font-size: 28px; color: var(--green);
    text-shadow: 0 0 10px var(--green-dim);
    margin-bottom: 4px;
    word-break: break-all;
  }
  .dp-loc { font-size: 11px; color: var(--muted); margin-bottom: 14px; }

  .dp-divider { border: none; border-top: 1px solid var(--border); margin: 14px 0; }

  .dp-label { font-size: 9px; letter-spacing: 2px; color: var(--muted); margin-bottom: 4px; }
  .dp-value { font-size: 11px; color: var(--text); margin-bottom: 14px; line-height: 1.5; word-break: break-word; }
  .dp-link { color: var(--blue); text-decoration: none; font-size: 10px; word-break: break-all; }
  .dp-link:hover { text-decoration: underline; }

  .dp-actions { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
  .dp-btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px; letter-spacing: 1px;
    padding: 8px 12px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
  }
  .dp-btn:hover { border-color: var(--green); color: var(--green); background: var(--green-glow); }
  .dp-btn.primary { border-color: var(--green-dim); color: var(--green); }
  .dp-btn.primary:hover { background: rgba(0,255,70,0.15); }

  .dp-status-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
  .dp-status-btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px; letter-spacing: 1px;
    padding: 4px 8px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .dp-status-btn:hover { border-color: var(--amber); color: var(--amber); }
  .dp-status-btn.active { border-color: var(--green); color: var(--green); background: var(--green-glow); }

  /* Notes textarea */
  .dp-notes {
    width: 100%;
    background: rgba(0,255,70,0.04);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    padding: 8px;
    resize: vertical;
    min-height: 70px;
    margin-top: 4px;
    outline: none;
  }
  .dp-notes:focus { border-color: var(--green-dim); }

  /* ── EMPTY STATE ── */
  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 200px; color: var(--muted); font-size: 11px; letter-spacing: 1px; gap: 8px;
  }
  .empty-state .blink { animation: blink 1s infinite; }
  @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }

  /* Scrollbar */
  .leads-list::-webkit-scrollbar { width: 4px; }
  .leads-list::-webkit-scrollbar-track { background: transparent; }
  .leads-list::-webkit-scrollbar-thumb { background: var(--border); }

  /* Loading overlay */
  .loading-bar {
    position: fixed; top: 48px; left: 0; right: 0;
    height: 2px; background: var(--green);
    transform-origin: left;
    transform: scaleX(0);
    transition: transform 0.4s ease;
    z-index: 200;
    box-shadow: 0 0 8px var(--green);
  }
  .loading-bar.active { transform: scaleX(0.7); }
  .loading-bar.done { transform: scaleX(1); transition: transform 0.1s ease; }
</style>
</head>
<body>

<div class="loading-bar" id="loadingBar"></div>

<div class="shell">

  <!-- TOP BAR -->
  <header class="topbar">
    <span class="topbar-logo">▶ LEAD RADAR // RAOUF px</span>
    <div class="topbar-sep"></div>
    <span class="topbar-stat"><span class="status-dot"></span>SYSTEM ACTIVE</span>
    <span class="topbar-stat">LEADS: <span id="totalCount">0</span></span>
    <span class="topbar-stat">NEW: <span id="newCount">0</span></span>
    <span class="topbar-stat" id="lastScanLabel">LAST SCAN: —</span>
  </header>

  <!-- RADAR PANEL -->
  <main class="radar-panel">
    <div class="radar-wrap">
      <canvas id="radarCanvas" width="480" height="480"></canvas>
      <div class="signal-notify" id="signalNotify">
        <div>◆ SIGNAL DETECTED</div>
        <div>SOURCE: <span class="src" id="notifySrc">—</span> &nbsp;|&nbsp; USER: <span id="notifyUser">—</span></div>
      </div>
    </div>
    <div class="radar-labels">
      <div class="rl"><div class="rl-dot" style="background:#00ff46;box-shadow:0 0 5px #00ff46"></div>INSTAGRAM</div>
      <div class="rl"><div class="rl-dot" style="background:#f0b44c;box-shadow:0 0 5px #f0b44c"></div>REDDIT</div>
      <div class="rl"><div class="rl-dot" style="background:#4cf0d0;box-shadow:0 0 5px #4cf0d0"></div>UPWORK</div>
    </div>
  </main>

  <!-- SIDEBAR LEADS LIST -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <span class="status-dot"></span> DETECTED SIGNALS
    </div>
    <div class="filters">
      <button class="filter-btn active" data-filter="all">ALL</button>
      <button class="filter-btn" data-filter="new">NEW</button>
      <button class="filter-btn" data-filter="reddit">REDDIT</button>
      <button class="filter-btn" data-filter="upwork">UPWORK</button>
      <button class="filter-btn" data-filter="instagram">INSTAGRAM</button>
    </div>
    <div class="leads-list" id="leadsList">
      <div class="empty-state">
        <span class="blink">▮</span>
        SCANNING FOR LEADS...
      </div>
    </div>
  </aside>

</div>

<!-- DETAIL PANEL -->
<div class="detail-panel" id="detailPanel">
  <button class="dp-close" id="detailClose">[ CLOSE ]</button>
  <div class="dp-platform" id="dp-platform">—</div>
  <div class="dp-user" id="dp-user">—</div>
  <div class="dp-loc" id="dp-loc">—</div>
  <hr class="dp-divider">
  <div class="dp-label">CAPTION / TITLE</div>
  <div class="dp-value" id="dp-caption">—</div>
  <div class="dp-label">PROFILE / POST LINK</div>
  <div class="dp-value"><a class="dp-link" id="dp-link" href="#" target="_blank">—</a></div>
  <div class="dp-label">DETECTED</div>
  <div class="dp-value" id="dp-time">—</div>
  <hr class="dp-divider">
  <div class="dp-label">STATUS</div>
  <div class="dp-status-row" id="dp-status-row"></div>
  <hr class="dp-divider">
  <div class="dp-label">NOTES</div>
  <textarea class="dp-notes" id="dp-notes" placeholder="add notes..."></textarea>
  <hr class="dp-divider">
  <div class="dp-actions">
    <button class="dp-btn primary" id="dp-open-profile">↗ OPEN PROFILE / POST</button>
    <button class="dp-btn" id="dp-save-notes">✓ SAVE NOTES</button>
  </div>
</div>

<script>
// ── CONFIG ──
const API_BASE = window.location.origin; // same origin
const ADMIN_KEY = (() => {
  let k = sessionStorage.getItem('radar_key');
  if (!k) {
    k = prompt('ADMIN KEY:');
    if (k) sessionStorage.setItem('radar_key', k);
  }
  return k || '';
})();

const PLATFORM_COLORS = {
  instagram: '#00ff46',
  reddit:    '#f0b44c',
  upwork:    '#4cf0d0',
};

const STATUS_OPTIONS = ['new','contacted','replied','code_sent','booked'];

// ── STATE ──
let leads = [];
let filteredLeads = [];
let currentFilter = 'all';
let selectedLead = null;
let radarSignals = []; // {x, y, color, age, lead}

// ── RADAR CANVAS ──
const canvas = document.getElementById('radarCanvas');
const ctx = canvas.getContext('2d');
const W = 480, H = 480, CX = W/2, CY = H/2, R = 220;
let sweepAngle = 0;
let lastTime = 0;

function polar(angle, r) {
  return { x: CX + Math.cos(angle) * r, y: CY + Math.sin(angle) * r };
}

// Assign stable radar positions to leads based on id hash
function leadToRadarPos(lead) {
  let hash = 0;
  for (let i = 0; i < lead.id.length; i++) hash = (hash * 31 + lead.id.charCodeAt(i)) & 0xFFFF;
  const angle = (hash / 0xFFFF) * Math.PI * 2;
  const dist = 40 + ((hash * 7919) % 0xFFFF) / 0xFFFF * (R - 50);
  return polar(angle, dist);
}

function drawRadar(ts) {
  const dt = ts - lastTime;
  lastTime = ts;
  sweepAngle = (sweepAngle + dt * 0.0008) % (Math.PI * 2);

  ctx.clearRect(0, 0, W, H);

  // Background fill
  ctx.fillStyle = '#020a04';
  ctx.fillRect(0, 0, W, H);

  // Pixel grid background
  ctx.strokeStyle = 'rgba(0,255,70,0.04)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 16) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y < H; y += 16) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  // Outer circle clip
  ctx.save();
  ctx.beginPath();
  ctx.arc(CX, CY, R + 2, 0, Math.PI*2);
  ctx.clip();

  // Concentric rings
  [0.25, 0.5, 0.75, 1.0].forEach(f => {
    ctx.beginPath();
    ctx.arc(CX, CY, R * f, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(0,255,70,0.12)';
    ctx.lineWidth = 1;
    ctx.stroke();
  });

  // Cross-hairs
  ctx.strokeStyle = 'rgba(0,255,70,0.1)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(CX - R, CY); ctx.lineTo(CX + R, CY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(CX, CY - R); ctx.lineTo(CX, CY + R); ctx.stroke();

  // Diagonal cross-hairs
  ctx.strokeStyle = 'rgba(0,255,70,0.05)';
  const d = R * Math.cos(Math.PI/4);
  ctx.beginPath(); ctx.moveTo(CX-d, CY-d); ctx.lineTo(CX+d, CY+d); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(CX+d, CY-d); ctx.lineTo(CX-d, CY+d); ctx.stroke();

  // Sweep gradient trail
  const sweepGrad = ctx.createConicalGradient
    ? null  // not standard — use manual arc
    : null;

  // Draw sweep as filled arc wedge
  const trailSteps = 60;
  for (let i = 0; i < trailSteps; i++) {
    const a0 = sweepAngle - (i / trailSteps) * 1.4;
    const a1 = sweepAngle - ((i+1) / trailSteps) * 1.4;
    const alpha = (1 - i / trailSteps) * 0.18;
    ctx.beginPath();
    ctx.moveTo(CX, CY);
    ctx.arc(CX, CY, R, a0, a1, true);
    ctx.closePath();
    ctx.fillStyle = `rgba(0,255,70,${alpha})`;
    ctx.fill();
  }

  // Sweep line
  const sp = polar(sweepAngle, R);
  ctx.beginPath();
  ctx.moveTo(CX, CY);
  ctx.lineTo(sp.x, sp.y);
  ctx.strokeStyle = 'rgba(0,255,70,0.9)';
  ctx.lineWidth = 1.5;
  ctx.shadowBlur = 8;
  ctx.shadowColor = '#00ff46';
  ctx.stroke();
  ctx.shadowBlur = 0;

  ctx.restore();

  // Outer ring border
  ctx.beginPath();
  ctx.arc(CX, CY, R, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(0,255,70,0.35)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Radar signals (leads as blips)
  radarSignals.forEach(sig => {
    // Fade in/out based on sweep proximity
    const angleDiff = ((sweepAngle - sig.angle) % (Math.PI*2) + Math.PI*2) % (Math.PI*2);
    let opacity;
    if (angleDiff < 0.15) {
      opacity = 1;
      sig.freshness = 1;
    } else {
      sig.freshness = Math.max(0, (sig.freshness || 0) - 0.002);
      opacity = 0.2 + sig.freshness * 0.8;
    }

    const { x, y } = sig;
    const r = sig.lead.status === 'new' ? 5 : 3.5;

    // Blip glow
    ctx.beginPath();
    ctx.arc(x, y, r + 4, 0, Math.PI*2);
    ctx.fillStyle = sig.color.replace(')', `,${opacity * 0.15})`).replace('rgb', 'rgba').replace('rgba(rgba', 'rgba');
    // Use simple approach:
    const glowGrad = ctx.createRadialGradient(x, y, 0, x, y, r + 4);
    glowGrad.addColorStop(0, hexToRgba(sig.color, opacity * 0.4));
    glowGrad.addColorStop(1, hexToRgba(sig.color, 0));
    ctx.fillStyle = glowGrad;
    ctx.fill();

    // Blip core
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI*2);
    ctx.fillStyle = hexToRgba(sig.color, opacity);
    ctx.shadowBlur = sig.lead.status === 'new' ? 10 : 5;
    ctx.shadowColor = sig.color;
    ctx.fill();
    ctx.shadowBlur = 0;

    // Square pixel overlay (retro effect)
    const px = Math.round(x - r/2), py = Math.round(y - r/2);
    ctx.fillStyle = hexToRgba(sig.color, opacity * 0.5);
    ctx.fillRect(px, py, Math.round(r), Math.round(r));
  });

  // Center dot
  ctx.beginPath();
  ctx.arc(CX, CY, 4, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,255,70,0.8)';
  ctx.fill();

  // Compass labels
  ctx.fillStyle = 'rgba(0,255,70,0.35)';
  ctx.font = '10px "Share Tech Mono"';
  ctx.textAlign = 'center';
  ctx.fillText('N', CX, CY - R - 10);
  ctx.fillText('S', CX, CY + R + 18);
  ctx.textAlign = 'left';
  ctx.fillText('E', CX + R + 8, CY + 4);
  ctx.textAlign = 'right';
  ctx.fillText('W', CX - R - 8, CY + 4);

  requestAnimationFrame(drawRadar);
}

function hexToRgba(hex, alpha) {
  if (hex.startsWith('#')) {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${alpha})`;
  }
  return hex;
}

// Canvas click → select lead
canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width, scaleY = H / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;

  let best = null, bestDist = 18;
  radarSignals.forEach(sig => {
    const d = Math.hypot(sig.x - mx, sig.y - my);
    if (d < bestDist) { bestDist = d; best = sig.lead; }
  });
  if (best) selectLead(best);
});

// ── FETCH LEADS ──
async function fetchLeads() {
  const bar = document.getElementById('loadingBar');
  bar.className = 'loading-bar active';
  try {
    const res = await fetch(`${API_BASE}/api/leads`, {
      headers: { 'x-admin-key': ADMIN_KEY }
    });
    if (!res.ok) throw new Error('Auth failed');
    const data = await res.json();
    bar.className = 'loading-bar done';
    setTimeout(() => bar.className = 'loading-bar', 500);

    const prevIds = new Set(leads.map(l => l.id));
    leads = data.leads || [];
    updateStats();
    buildRadarSignals();
    applyFilter(currentFilter);

    // Announce new arrivals
    const newOnes = leads.filter(l => !prevIds.has(l.id));
    if (newOnes.length && prevIds.size > 0) {
      const l = newOnes[0];
      showSignalNotify(l.platform, l.username);
    }

    document.getElementById('lastScanLabel').textContent = `LAST SCAN: ${new Date().toLocaleTimeString()}`;
  } catch(e) {
    bar.className = 'loading-bar';
    console.error('Fetch error', e);
  }
}

function updateStats() {
  document.getElementById('totalCount').textContent = leads.length;
  document.getElementById('newCount').textContent = leads.filter(l => l.status === 'new').length;
}

function buildRadarSignals() {
  radarSignals = leads.map(lead => {
    const pos = leadToRadarPos(lead);
    // compute angle from center for sweep interaction
    const angle = Math.atan2(pos.y - CY, pos.x - CX);
    return {
      x: pos.x, y: pos.y,
      angle: (angle + Math.PI*2) % (Math.PI*2),
      color: PLATFORM_COLORS[lead.platform] || '#00ff46',
      freshness: 0,
      lead
    };
  });
}

// ── RENDER LEADS LIST ──
function applyFilter(filter) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === filter));

  filteredLeads = leads.filter(l => {
    if (filter === 'all') return true;
    if (filter === 'new') return l.status === 'new';
    return l.platform === filter;
  });

  renderLeadsList();
}

function renderLeadsList() {
  const list = document.getElementById('leadsList');
  if (!filteredLeads.length) {
    list.innerHTML = `<div class="empty-state"><span class="blink">▮</span>NO SIGNALS DETECTED</div>`;
    return;
  }
  list.innerHTML = filteredLeads.map(lead => `
    <div class="lead-card ${lead.status === 'new' ? '' : ''}" data-id="${lead.id}" onclick="selectLead(leads.find(l=>l.id==='${lead.id}'))">
      <div class="lc-top">
        <span class="lc-platform ${lead.platform}">${lead.platform.toUpperCase()}</span>
        <span class="lc-user">${escHtml(lead.username)}</span>
        <span class="lc-time">${timeAgo(lead.detected_time)}</span>
      </div>
      <div class="lc-title">${escHtml(lead.caption_or_title || '—')}</div>
      <span class="status-badge ${lead.status}">${lead.status.replace('_',' ').toUpperCase()}</span>
    </div>
  `).join('');
}

// ── SELECT LEAD / DETAIL PANEL ──
function selectLead(lead) {
  if (!lead) return;
  selectedLead = lead;

  // Highlight list card
  document.querySelectorAll('.lead-card').forEach(c => c.classList.toggle('selected', c.dataset.id === lead.id));

  // Populate detail panel
  document.getElementById('dp-platform').textContent = `◆ ${lead.platform.toUpperCase()} SIGNAL`;
  document.getElementById('dp-platform').style.color = PLATFORM_COLORS[lead.platform] || 'var(--green)';
  document.getElementById('dp-user').textContent = lead.username;
  document.getElementById('dp-loc').textContent = `📍 ${lead.location || 'Dubai'}`;
  document.getElementById('dp-caption').textContent = lead.caption_or_title || '—';
  const link = document.getElementById('dp-link');
  link.href = lead.profile_or_post_link || '#';
  link.textContent = lead.profile_or_post_link || '—';
  document.getElementById('dp-time').textContent = new Date(lead.detected_time).toLocaleString();
  document.getElementById('dp-notes').value = lead.notes || '';

  // Status buttons
  const row = document.getElementById('dp-status-row');
  row.innerHTML = STATUS_OPTIONS.map(s => `
    <button class="dp-status-btn ${lead.status === s ? 'active' : ''}"
      onclick="updateStatus('${lead.id}','${s}')">${s.replace('_',' ').toUpperCase()}</button>
  `).join('');

  document.getElementById('detailPanel').classList.add('open');
}

document.getElementById('detailClose').addEventListener('click', () => {
  document.getElementById('detailPanel').classList.remove('open');
});
document.getElementById('dp-open-profile').addEventListener('click', () => {
  if (selectedLead?.profile_or_post_link) window.open(selectedLead.profile_or_post_link, '_blank');
});
document.getElementById('dp-save-notes').addEventListener('click', async () => {
  if (!selectedLead) return;
  await patchLead(selectedLead.id, { notes: document.getElementById('dp-notes').value });
});

// ── API CALLS ──
async function updateStatus(id, status) {
  await patchLead(id, { status });
}
async function patchLead(id, patch) {
  try {
    const res = await fetch(`${API_BASE}/api/leads/${id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', 'x-admin-key': ADMIN_KEY },
      body: JSON.stringify(patch)
    });
    if (!res.ok) throw new Error();
    const updated = await res.json();
    // Merge into local state
    const idx = leads.findIndex(l => l.id === id);
    if (idx >= 0) leads[idx] = { ...leads[idx], ...patch };
    if (selectedLead?.id === id) selectLead(leads[idx]);
    updateStats();
    applyFilter(currentFilter);
  } catch(e) { console.error('Patch error', e); }
}

// ── SIGNAL NOTIFICATION ──
let notifyTimer;
function showSignalNotify(platform, user) {
  document.getElementById('notifySrc').textContent = platform.toUpperCase();
  document.getElementById('notifyUser').textContent = user;
  const el = document.getElementById('signalNotify');
  el.classList.add('show');
  clearTimeout(notifyTimer);
  notifyTimer = setTimeout(() => el.classList.remove('show'), 4000);
}

// ── FILTERS ──
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => applyFilter(btn.dataset.filter));
});

// ── HELPERS ──
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function timeAgo(ts) {
  if (!ts) return '—';
  const sec = Math.floor((Date.now() - new Date(ts)) / 1000);
  if (sec < 60) return `${sec}s`;
  if (sec < 3600) return `${Math.floor(sec/60)}m`;
  if (sec < 86400) return `${Math.floor(sec/3600)}h`;
  return `${Math.floor(sec/86400)}d`;
}

// ── BOOT ──
requestAnimationFrame(drawRadar);
fetchLeads();
setInterval(fetchLeads, 60_000); // refresh every minute
</script>
